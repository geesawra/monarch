name: Build and Release

on:
  push:
    branches: [main]
    paths-ignore:
      - 'beepboop/**'
      - '**.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'beepboop/**'
      - '**.md'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: ${{ env.HOME }}/android-sdk
          key: android-sdk-36-build-tools-36.1.0

      - name: Set up Android SDK
        run: |
          source install-android-sdk.sh
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      # Monarch depends on `sh.christian.ozone:*:0.3.3-local`, a version that only exists
      # after running scripts/publish-ozone-local.sh. The script clones ozone, builds it, and
      # stages the resulting maven layout into libs/ozone-artifacts/ (which is .gitignored).
      # Cache the output keyed on OZONE_REF so we only pay the ~3-5 min ozone build cost when
      # the pinned ref actually changes. On cache hit, libs/ozone-artifacts/ is restored from
      # cache and the "Publish ozone" step is skipped entirely.
      - name: Extract OZONE_REF
        id: ozone-ref
        run: |
          ref=$(grep '^OZONE_REF=' scripts/publish-ozone-local.sh | head -1 | cut -d'"' -f2)
          echo "ref=$ref" >> $GITHUB_OUTPUT
          echo "pinned ozone ref: $ref"

      - name: Cache ozone build
        id: ozone-cache
        uses: actions/cache@v4
        with:
          path: |
            libs/ozone-artifacts
            ~/.cache/monarch-ozone-src
            ~/.local/share/monarch/ozone-publish-key
          key: ozone-build-${{ steps.ozone-ref.outputs.ref }}-v1

      - name: Publish ozone artifacts locally
        if: steps.ozone-cache.outputs.cache-hit != 'true'
        run: scripts/publish-ozone-local.sh

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" | base64 -d > app/google-services.json

      - name: Decrypt keystore
        env:
          AGE_KEY: ${{ secrets.AGE_KEY }}
        run: |
          sudo apt-get install -y age
          echo "$AGE_KEY" > age-key.txt
          age --decrypt -i age-key.txt -o app/keystore.jks keystore.jks.age
          rm age-key.txt

      - name: Build release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          sed -i '/toolchainVendor/d' gradle/gradle-daemon-jvm.properties
          ./gradlew assembleRelease --no-daemon -Dorg.gradle.java.installations.auto-download=false

      - name: Upload to Cloudflare R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npm i -D wrangler@latest
          source ./generate-root.sh app/build/outputs/apk/release/app-release.apk
          npx wrangler r2 object put monarch-releases/$MONARCH_APK_FILENAME --remote true --file=$MONARCH_APK_PATH
          npx wrangler r2 object put monarch-releases/index.html --remote true --file=./index.html
          echo "MONARCH_APK_FILENAME=$MONARCH_APK_FILENAME" >> $GITHUB_ENV

      - name: Delete previous APKs from Cloudflare R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          # List every monarch-release-*.apk in the bucket, drop the one we just uploaded,
          # delete the rest. Tolerates listing/delete failures so a stale-cleanup hiccup
          # never breaks a successful release.
          set +e
          npx wrangler r2 object list monarch-releases --remote --prefix monarch-release- > /tmp/r2-listing.txt 2>&1
          grep -oE 'monarch-release-[0-9]+\.apk' /tmp/r2-listing.txt | sort -u > /tmp/r2-apks.txt
          cat /tmp/r2-apks.txt
          while IFS= read -r key; do
            if [ -z "$key" ] || [ "$key" = "$MONARCH_APK_FILENAME" ]; then
              continue
            fi
            echo "Deleting previous APK: $key"
            npx wrangler r2 object delete "monarch-releases/$key" --remote
          done < /tmp/r2-apks.txt
          exit 0
