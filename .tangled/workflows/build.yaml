engine: nixery

when:
  - event: ["push", "pull_request"]
    branch: ["main"]

dependencies:
  nixpkgs:
    - fastlane
    - jdk24

environment:
  LC_ALL: "en_US.UTF-8"
  LANG: "en_US.UTF-8"
  LANGUAGE: "en_US.UTF-8"
  
steps:
  - name: build-release-apk
    command: |
      JDK_PATH=$(nix eval nixpkgs#jdk24.outPath --extra-experimental-features nix-command --extra-experimental-features flakes)
      export PATH=$JDK_PATH/bin:$PATH
      export JAVA_HOME=$JDK_PATH
      fastlane release_bin
