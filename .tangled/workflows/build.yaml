engine: nixery

when:
  - event: ["push", "pull_request"]
    branch: ["main"]

dependencies:
  nixpkgs:
    - gnugrep
    - gnused
    - curl
    - unzip
    - findutils
    - zlib
    - glibc
    - gcc-unwrapped
    - fastlane
    - jdk24

environment:
  LC_ALL: "en_US.UTF-8"
  LANG: "en_US.UTF-8"
  LANGUAGE: "en_US.UTF-8"
  
steps:
  - name: build-release-apk
    command: |
      JDK=/nix/store/$(ls /nix/store | grep openjdk-24)
      source $JDK/nix-support/setup-hook
      source install-android-sdk.sh
      fastlane release_bin
