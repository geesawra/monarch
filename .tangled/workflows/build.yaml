engine: nixery

when:
  - event: ["push", "pull_request"]
    branch: ["main"]

dependencies:
  nixpkgs:
    - fastlane
    - jdk24

environment:
  LC_ALL: "en_US.UTF-8"
  LANG: "en_US.UTF-8"
  LANGUAGE: "en_US.UTF-8"
  
steps:
  - name: build-release-apk
    command: |
      ./gradlew assembleRelease
      #fastlane release_bin
