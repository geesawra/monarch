engine: nixery

when:
  - event: ["push", "pull_request"]
    branch: ["main"]

dependencies:
  nixpkgs:
    - gnugrep
    - gnused
    - curl
    - unzip
    - findutils
    - zlib
    - glibc
    - gcc-unwrapped
    - fastlane
    - jdk24
    - wrangler
      
steps:
  - name: build-release-apk
    command: |
      JDK=/nix/store/$(ls /nix/store | grep openjdk-24)
      source $JDK/nix-support/setup-hook
      source install-android-sdk.sh
      fastlane release_bin
      wrangler r2 object put monarch-releases/monarch-release.apk --file=app/build/outputs/apk/release/app-release.apk
